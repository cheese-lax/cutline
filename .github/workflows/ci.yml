name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install development dependencies
        run: python -m pip install -r requirements/dev.txt
      - name: Run tests
        run: python -m pytest
      - name: Run Ruff
        run: python -m ruff check .
      - name: Check service CLI
        run: python rmbg_onnx_runner/web_app.py --help

  script-syntax:
    name: Installation script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check POSIX shell scripts
        run: bash -n scripts/*.sh
      - name: Check PowerShell scripts
        shell: pwsh
        run: |
          $allErrors = @()
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null
            $allErrors += $parseErrors
          }
          if ($allErrors.Count -gt 0) {
            $allErrors | Format-List | Out-String | Write-Error
            exit 1
          }
