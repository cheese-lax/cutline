<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cutline 本地抠图</title>
    <link rel="icon" type="image/png" href="/cutline-logo.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><img src="/cutline-logo.png" alt="" /></div>
        <h1>Cutline</h1>
      </div>
      <div class="top-runtime-controls" aria-label="处理设置">
        <label class="top-runtime-control" for="modelSelect">
          <span>抠图模型</span>
          <select id="modelSelect" class="model-select" title="服务会记住上次成功加载的模型" disabled>
            <option value="">正在读取 models 文件夹…</option>
          </select>
        </label>
        <label class="top-runtime-control" for="providerSelect">
          <span>推理方式</span>
          <select id="providerSelect" class="model-select" disabled></select>
        </label>
        <div class="top-runtime-control top-processing-control">
          <span id="processingModeLabel">处理模式</span>
          <div class="segmented processing-mode-control" role="radiogroup" aria-labelledby="processingModeLabel">
            <label>
              <input type="radio" name="processingMode" value="rmbg" checked />
              <span>智能抠图</span>
            </label>
            <label>
              <input type="radio" name="processingMode" value="line_art" />
              <span>线稿模式</span>
            </label>
          </div>
        </div>
        <small id="processingModeHint" class="top-mode-hint" hidden></small>
        <div id="modelHelp" class="model-help top-model-help" hidden>
          <p>将 ONNX 模型放入 <code id="modelsDirectory">models/</code> 后刷新页面。</p>
          <a href="https://huggingface.co/briaai/RMBG-2.0/tree/main/onnx">下载 RMBG-2.0 ONNX 模型</a>
          <p>下载和使用前请确认模型许可证。</p>
        </div>
      </div>
      <div class="top-actions">
        <span id="statusText" class="status" aria-live="polite">服务检查中</span>
        <button
          id="themeToggleBtn"
          class="theme-toggle"
          type="button"
          aria-label="切换到深色主题"
          aria-pressed="false"
        >
          <span class="theme-icon" aria-hidden="true">
            <svg class="sun-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3.5" />
              <path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.3 5.3l1.4 1.4M17.3 17.3l1.4 1.4M18.7 5.3l-1.4 1.4M6.7 17.3l-1.4 1.4" />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24">
              <path d="M20 15.4A8.4 8.4 0 0 1 8.6 4a8.5 8.5 0 1 0 11.4 11.4Z" />
            </svg>
          </span>
          <span id="themeLabel">深色模式</span>
        </button>
        <button id="openOutputBtn" class="ghost" type="button" disabled>打开本次结果文件夹</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="side-panel">
        <section class="panel-block">
          <h2>上传</h2>
          <div class="upload-stack">
            <button id="chooseSingleBtn" class="upload-card" type="button">
              <span class="line-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 3v11m0-11 4 4m-4-4-4 4M5 14v5h14v-5" /></svg>
              </span>
              <span>
                <strong>上传单张图片</strong>
                <small>支持 JPG、PNG、WEBP、静态 AVIF、BMP、单页 TIFF、ICO、TGA</small>
              </span>
            </button>
            <button id="chooseFilesBtn" class="upload-card" type="button">
              <span class="line-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M8 7h11v13H8zM5 4h11v3M5 4v13h3" /></svg>
              </span>
              <span>
                <strong>上传多张图片</strong>
              </span>
            </button>
            <button id="chooseFolderBtn" class="upload-card" type="button">
              <span class="line-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M3 7h7l2 3h9v10H3z" /></svg>
              </span>
              <span>
                <strong>选择文件夹</strong>
                <small>包含子文件夹中的图片</small>
              </span>
            </button>
          </div>
          <div id="dropZone" class="drop-zone">也可以把图片或文件夹拖到这里</div>
          <input
            id="singleFileInput"
            type="file"
            accept="image/*,.psd,.qoi,.jp2,.j2k,.j2c,.jpc,.jpf,.jpx,.dds,.tga,.icb,.vda,.vst,.pfm,.pnm,.ppm,.pgm,.pbm,.avifs"
            hidden
          />
          <input
            id="fileInput"
            type="file"
            accept="image/*,.psd,.qoi,.jp2,.j2k,.j2c,.jpc,.jpf,.jpx,.dds,.tga,.icb,.vda,.vst,.pfm,.pnm,.ppm,.pgm,.pbm,.avifs"
            multiple
            hidden
          />
          <input
            id="folderInput"
            type="file"
            accept="image/*,.psd,.qoi,.jp2,.j2k,.j2c,.jpc,.jpf,.jpx,.dds,.tga,.icb,.vda,.vst,.pfm,.pnm,.ppm,.pgm,.pbm,.avifs"
            multiple
            webkitdirectory
            hidden
          />
        </section>

        <section class="panel-block settings-panel">
          <div class="panel-title">
            <h2>输出设置</h2>
            <button id="clearBtn" class="tiny" type="button">重置</button>
          </div>

          <label class="field-label">输出格式</label>
          <div class="segmented output-format-control">
            <label>
              <input type="radio" name="outputFormat" value="png" checked />
              <span>PNG</span>
            </label>
            <label>
              <input type="radio" name="outputFormat" value="webp" />
              <span>WEBP</span>
            </label>
            <label>
              <input type="radio" name="outputFormat" value="jpg" />
              <span>JPG</span>
            </label>
            <label>
              <input type="radio" name="outputFormat" value="avif" />
              <span>AVIF</span>
            </label>
          </div>

          <div class="switch-row">
            <span>边缘优化</span>
            <label class="switch">
              <input id="edgeOptimize" type="checkbox" checked />
              <span></span>
            </label>
          </div>
          <small id="edgeOptimizeHint" class="hint-left">轻微柔化透明边缘，减少锯齿</small>
          <div class="switch-row">
            <span>透明背景</span>
            <label class="switch">
              <input id="transparentBackground" type="checkbox" checked />
              <span></span>
            </label>
          </div>

          <label class="field-label" for="backgroundColor">背景颜色</label>
          <div class="color-row">
            <input id="backgroundColor" type="color" value="#ffffff" />
            <input id="backgroundColorText" type="text" value="#FFFFFF" maxlength="7" />
          </div>
          <small id="backgroundHint" class="hint-left">仅在关闭透明背景时生效</small>
        </section>
        <section class="panel-block settings-actions">
          <button id="processBtn" class="primary" type="button" disabled>开始抠图</button>
          <p id="quotaText" class="privacy-note" aria-live="polite"></p>
        </section>
      </aside>

      <section class="preview-panel">
        <div class="section-head">
          <h2>预览</h2>
          <div class="preview-actions">
            <button id="rerunBtn" class="ghost" type="button" disabled>
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 8.7M20 4.5v4.2h-4.2M20 12a8 8 0 0 1-13.7 5.6L4 15.3M4 19.5v-4.2h4.2" /></svg>
              </span>
              <span>重新抠图</span>
            </button>
            <a id="downloadFirstBtn" class="download disabled" href="#" download>
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 3v11m0 0 4-4m-4 4-4-4M5 17v3h14v-3" /></svg>
              </span>
              <span>下载</span>
            </a>
          </div>
        </div>
        <div class="preview-grid">
          <figure>
            <figcaption>原图</figcaption>
            <div
              id="originalUploadZone"
              class="image-stage upload-target"
              tabindex="0"
              aria-label="原图上传区域，支持拖拽或粘贴图片"
            >
              <img id="originalPreview" alt="" />
              <span id="originalEmpty">拖拽或粘贴图片到这里</span>
            </div>
          </figure>
          <figure>
            <figcaption>抠图结果</figcaption>
            <div class="image-stage checker">
              <img id="resultPreview" alt="" />
              <span id="resultEmpty">等待处理</span>
            </div>
          </figure>
        </div>
        <div class="file-summary">
          <div>
            <span class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6zM14 3v4h4" /></svg>
            </span>
            <span>
              <small>文件名</small>
              <strong id="fileNameMeta">-</strong>
            </span>
          </div>
          <div>
            <span class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4zM8 9h8M8 13h5" /></svg>
            </span>
            <span>
              <small>分辨率</small>
              <strong id="resolutionMeta">-</strong>
            </span>
          </div>
          <div>
            <span class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" /></svg>
            </span>
            <span>
              <small>输出格式</small>
              <strong id="formatMeta">PNG（透明背景）</strong>
            </span>
          </div>
        </div>
      </section>

      <aside class="task-panel">
        <div class="section-head">
          <h2 id="taskManagerTitle">任务管理</h2>
          <button id="clearListBtn" class="ghost danger-text" type="button">清空列表</button>
        </div>
        <div class="task-content">
          <section class="current-task-section">
            <div class="current-task-heading">
              <strong id="resultTitle">当前任务</strong>
            </div>
            <div class="task-stats">
              <div><strong id="totalCount">0</strong><span>总数</span></div>
              <div><strong id="processingCount">0</strong><span>处理中</span></div>
              <div><strong id="completedCount">0</strong><span>已完成</span></div>
              <div><strong id="pendingCount">0</strong><span>待处理</span></div>
            </div>
            <div id="progressBar" class="progress"><span></span></div>
            <div id="resultGrid" class="result-grid"></div>
            <div class="task-actions">
              <button id="openOutputBtnBottom" class="ghost" type="button" disabled>打开本次结果文件夹</button>
            </div>
          </section>
          <section class="history-management">
            <div class="history-heading">
              <h2>历史任务</h2>
              <button id="refreshHistoryBtn" class="tiny" type="button">刷新</button>
            </div>
            <div class="history-summary-block">
              <span id="historySummary">正在计算占用空间…</span>
              <span id="historyFeedback" class="history-feedback" aria-live="polite" hidden></span>
            </div>
            <div class="history-toolbar">
              <label class="history-select-all">
                <input id="selectAllHistory" type="checkbox" />
                <span>全选</span>
              </label>
              <button id="deleteSelectedTasksBtn" class="tiny danger-text" type="button" disabled>
                删除所选
              </button>
            </div>
            <div class="quick-cleanup-row">
              <span>一键清理</span>
              <button class="tiny quick-cleanup" type="button" data-cleanup-days="7">清理 7 天前</button>
              <button
                id="cleanupHistoryBtn"
                class="tiny quick-cleanup danger-text"
                type="button"
                data-cleanup-days="30"
              >清理 30 天前</button>
            </div>
            <div id="historyTaskList" class="history-task-list" aria-live="polite"></div>
          </section>
        </div>
      </aside>
    </main>

    <div id="runtimeToast" class="runtime-toast" role="status" aria-live="polite" hidden></div>

    <script src="/app.js"></script>
  </body>
</html>
